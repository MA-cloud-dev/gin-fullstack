server {
    listen       8080;
    server_name localhost;

    # 前端静态文件 - 子路径
    location /ginfullstack/ {
        alias /usr/share/nginx/html/;
        index index.html;
        add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
        try_files $uri $uri/ /ginfullstack/index.html;
    }

    # API 代理 - 通过 Docker 内网通信
    location /ginfullstack/api {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/ginfullstack/api/(.*)$ /$1 break;
        proxy_pass http://177.7.0.12:8888;
    }

    # Swagger 代理
    location /ginfullstack/swagger {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/ginfullstack/swagger/(.*)$ /swagger/$1 break;
        proxy_pass http://177.7.0.12:8888;
    }

    # 根路径重定向到 ginfullstack
    location = / {
        return 301 /ginfullstack/;
    }
}